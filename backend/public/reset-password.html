<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — Ignitel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        linear-gradient(160deg, rgba(6,6,22,0.93) 0%, rgba(18,10,44,0.89) 45%, rgba(8,18,50,0.92) 100%),
        url("/images/banner-condominio.png") center / cover no-repeat fixed;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: -20%; right: -15%;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(99,102,241,0.16) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      bottom: -25%; left: -10%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.11) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 2.4rem 2.2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .brand img {
      height: 52px;
      width: auto;
      filter: brightness(1.8) drop-shadow(0 0 12px rgba(165,180,252,0.5));
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.025em;
      margin-bottom: 0.4rem;
      text-align: center;
    }
    .card-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.86rem;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.42rem;
      letter-spacing: 0.02em;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      color: #fff;
      padding: 0.78rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
      background: rgba(255,255,255,0.1);
    }

    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.97rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 0.9rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.84rem;
      font-weight: 600;
      display: none;
    }
    .msg-ok  { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .msg-err { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

    /* ── Done state ── */
    .done { display: none; text-align: center; }

    .done-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.4rem;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .done-icon-wrap svg {
      width: 32px;
      height: 32px;
      color: #a5b4fc;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 0.5s 0.3s ease forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .done h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .done p {
      color: rgba(255,255,255,0.5);
      font-size: 0.87rem;
      margin-bottom: 1.6rem;
      line-height: 1.5;
    }

    .back-btn {
      display: inline-block;
      width: 100%;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.97rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      text-align: center;
    }
    .back-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .invalid-msg {
      color: #f87171;
      font-size: 0.87rem;
      text-align: center;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/images/logo-ignitel.png" alt="Ignitel" />
    </div>

    <div id="form-view">
      <h1 class="card-title">Nueva contraseña</h1>
      <p class="card-sub">Ingresá tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

      <div class="field">
        <label for="pass">Nueva contraseña</label>
        <input type="password" id="pass" placeholder="••••••••" minlength="8" />
      </div>
      <div class="field">
        <label for="pass2">Confirmar contraseña</label>
        <input type="password" id="pass2" placeholder="••••••••" minlength="8" />
      </div>

      <button id="btn" onclick="submitForm()">Guardar contraseña</button>
      <div id="msg" class="msg"></div>
    </div>

    <div id="done-view" class="done">
      <div class="done-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Contraseña actualizada</h2>
      <p>Tu contraseña fue cambiada correctamente. Ya podés ingresar al sistema.</p>
      <a class="back-btn" href="{{FRONTEND_URL}}">Ir al sistema</a>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('form-view').innerHTML = `
        <p class="invalid-msg">Link inválido. Solicitá un nuevo link desde la pantalla de login.</p>
        <a class="back-btn" href="{{FRONTEND_URL}}">← Volver al sistema</a>`;
    }

    async function submitForm() {
      const pass  = document.getElementById('pass').value;
      const pass2 = document.getElementById('pass2').value;
      const btn   = document.getElementById('btn');

      if (pass.length < 8) return showMsg('La contraseña debe tener al menos 8 caracteres.', false);
      if (pass !== pass2)  return showMsg('Las contraseñas no coinciden.', false);

      btn.disabled = true;
      btn.textContent = 'Guardando…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al guardar');
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('done-view').style.display = 'block';
      } catch(e) {
        showMsg(e.message, false);
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
      }
    }

    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${ok ? 'msg-ok' : 'msg-err'}`;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitForm();
    });
  </script>
</body>
</html>
